<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- ===== BOX ICONS ===== -->
    <link href='https://cdn.jsdelivr.net/npm/boxicons@2.0.5/css/boxicons.min.css' rel='stylesheet'>
    
    <style>
        /*===== GOOGLE FONTS =====*/
        @import url("https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap");

        /*===== VARIABLES CSS =====*/
        :root {
            --first-color: #12192C;
            --text-color: #8590AD;
        }

        /*=== Fuente y tipografia ===*/
        :root {
            --body-font: 'Roboto', sans-serif;
            --big-font-size: 2rem;
            --normal-font-size: 0.938rem;
            --smaller-font-size: 0.875rem;
        }

        @media screen and (min-width: 768px) {
            :root {
                --big-font-size: 2.5rem;
                --normal-font-size: 1rem;
            }
        }

        /*===== BASE =====*/
        *,
        ::before,
        ::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: var(--body-font);
            color: var(--first-color);
        }

        h1 {
            margin: 0;
        }

        a {
            text-decoration: none;
        }

        img {
            max-width: 100%;
            height: auto;
        }

        /*===== FORM =====*/
        .l-form {
            position: relative;
            height: 100vh;
            overflow: hidden;
        }

        /*=== Shapes ===*/
        .shape1,
        .shape2 {
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
        }

        .shape1 {
            top: -7rem;
            left: -3.5rem;
            background: linear-gradient(180deg, var(--first-color) 0%, rgba(196, 196, 196, 0) 100%);
        }

        .shape2 {
            bottom: -6rem;
            right: -5.5rem;
            background: linear-gradient(180deg, var(--first-color) 0%, rgba(196, 196, 196, 0) 100%);
            transform: rotate(180deg);
        }

        /*=== Form ===*/
        .form {
            height: 100vh;
            display: grid;
            justify-content: center;
            align-items: center;
            padding: 0 1rem;
        }

        .form__content {
            width: 290px;
        }

        .form__img {
            display: none;
        }

        .form__title {
            font-size: var(--big-font-size);
            font-weight: 500;
            margin-bottom: 2rem;
        }

        .form__div {
            position: relative;
            display: grid;
            grid-template-columns: 7% 93%;
            margin-bottom: 1rem;
            padding: .25rem 0;
            border-bottom: 1px solid var(--text-color);
        }

        .form__div.focus {
            border-bottom: 1px solid var(--first-color);
        }

        .form__div-one {
            margin-bottom: 3rem;
        }

        .form__icon {
            font-size: 1.5rem;
            color: var(--text-color);
            transition: .3s;
        }

        .form__div.focus .form__icon {
            color: var(--first-color);
        }

        .form__label {
            display: block;
            position: absolute;
            left: .75rem;
            top: .25rem;
            font-size: var(--normal-font-size);
            color: var(--text-color);
            transition: .3s;
        }

        .form__div.focus .form__label {
            top: -1.5rem;
            font-size: .875rem;
            color: var(--first-color);
        }

        .form__div-input {
            position: relative;
        }

        .form__input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            outline: none;
            background: none;
            padding: .5rem .75rem;
            font-size: 1.2rem;
            color: var(--first-color);
            transition: .3s;
        }

        .form__forgot {
            display: block;
            text-align: right;
            margin-bottom: 2rem;
            font-size: var(--normal-font-size);
            color: var(--text-color);
            font-weight: 500;
            transition: .5s;
        }

        .form__forgot:hover {
            color: var(--first-color);
        }

        .form__button {
            width: 100%;
            padding: 1rem;
            font-size: var(--normal-font-size);
            outline: none;
            border: none;
            margin-bottom: 3rem;
            background-color: var(--first-color);
            color: #fff;
            border-radius: .5rem;
            cursor: pointer;
            transition: .3s;
        }

        .form__button:hover {
            box-shadow: 0px 15px 36px rgba(0, 0, 0, .15);
        }

        /*=== Form social===*/
        .form__social {
            text-align: center;
        }

        .form__social-text {
            display: block;
            font-size: var(--normal-font-size);
            margin-bottom: 1rem;
        }

        .form__social-icon {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 30px;
            height: 30px;
            margin-right: 1rem;
            padding: .5rem;
            background-color: var(--text-color);
            color: #fff;
            font-size: 1.25rem;
            border-radius: 50%;
        }

        .form__social-icon:hover {
            background-color: var(--first-color);
        }

        /* Signup Link */
        .form__signup {
            text-align: center;
            font-size: var(--normal-font-size);
            color: var(--text-color);
        }

        .form__signup a {
            color: var(--first-color);
            font-weight: 500;
            cursor: pointer;
        }

        .form__signup a:hover {
            text-decoration: underline;
        }

        /* Form Toggle */
        .form__container {
            position: relative;
            min-height: 380px;
        }

        .form__box {
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .form__box.hidden {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            opacity: 0;
            pointer-events: none;
            transform: translateX(20px);
        }

        .form__box.active {
            opacity: 1;
            pointer-events: all;
            transform: translateX(0);
        }

        /*===== MEDIA QUERIES =====*/
        @media screen and (min-width: 968px) {
            .shape1 {
                width: 400px;
                height: 400px;
                top: -11rem;
                left: -6.5rem;
            }

            .shape2 {
                width: 300px;
                height: 300px;
                right: -6.5rem;
            }

            .form {
                grid-template-columns: 1.5fr 1fr;
                padding: 0 2rem;
            }

            .form__content {
                width: 320px;
            }

            .form__img {
                display: block;
                width: 700px;
                justify-self: center;
            }
        }
    </style>
    <title>Login / Sign Up</title>
</head>
<body>
    <div class="l-form">
        <div class="shape1"></div>
        <div class="shape2"></div>
        
        <div class="form">
            <img src="../../assets/img/login.png" alt="" class="form__img">
            
            <div class="form__content">
                
                <!-- ========== LOGIN FORM ========== -->
                <form id="login-form" class="form__box active" action="">
                    <h1 class="form__title">Welcome</h1>
                    
                    <!-- Email / Username -->
                    <div class="form__div form__div-one">
                        <div class="form__icon">
                            <i class='bx bx-user-circle'></i>
                        </div>
                        <div class="form__div-input">
                            <label for="login-username" class="form__label">Email / Username</label>
                            <input type="text" id="login-username" class="form__input" required>
                        </div>
                    </div>
                    
                    <!-- Password -->
                    <div class="form__div">
                        <div class="form__icon">
                            <i class='bx bx-lock'></i>
                        </div>
                        <div class="form__div-input">
                            <label for="login-password" class="form__label">Password</label>
                            <input type="password" id="login-password" class="form__input" required>
                        </div>
                    </div>
                    
                    <a href="#" class="form__forgot">Forgot Password?</a>
                    
                    <input type="submit" class="form__button" value="Login">
                    
                    <!-- Google Login -->
                    <div class="form__social">
                        <span class="form__social-text">Or login with</span>
                        <a href="#" class="form__social-icon">
                            <i class='bx bxl-google'></i>
                        </a>
                    </div>
                    
                    <!-- Sign up link -->
                    <div class="form__signup">
                        Don't have an account? 
                        <a id="show-signup">Sign up</a>
                    </div>
                </form>

                <!-- ========== SIGNUP FORM ========== -->
                <form id="signup-form" class="form__box hidden" action="">
                    <h1 class="form__title">Create Account</h1>
                    
                    <!-- Name -->
                    <div class="form__div form__div-one">
                        <div class="form__icon">
                            <i class='bx bx-user'></i>
                        </div>
                        <div class="form__div-input">
                            <label for="signup-name" class="form__label">Name</label>
                            <input type="text" id="signup-name" class="form__input" required>
                        </div>
                    </div>
                    
                    <!-- Email -->
                    <div class="form__div">
                        <div class="form__icon">
                            <i class='bx bx-envelope'></i>
                        </div>
                        <div class="form__div-input">
                            <label for="signup-email" class="form__label">Email</label>
                            <input type="email" id="signup-email" class="form__input" required>
                        </div>
                    </div>
                    
                    <!-- Password -->
                    <div class="form__div">
                        <div class="form__icon">
                            <i class='bx bx-lock'></i>
                        </div>
                        <div class="form__div-input">
                            <label for="signup-password" class="form__label">Password</label>
                            <input type="password" id="signup-password" class="form__input" required>
                        </div>
                    </div>
                    
                    <!-- Confirm Password -->
                    <div class="form__div">
                        <div class="form__icon">
                            <i class='bx bx-lock-alt'></i>
                        </div>
                        <div class="form__div-input">
                            <label for="signup-confirm" class="form__label">Confirm Password</label>
                            <input type="password" id="signup-confirm" class="form__input" required>
                        </div>
                    </div>
                    
                    <input type="submit" class="form__button" value="Sign Up">
                    
                    <!-- Google Sign Up (optional) -->
                    <div class="form__social">
                        <span class="form__social-text">Or sign up with</span>
                        <a href="#" class="form__social-icon">
                            <i class='bx bxl-google'></i>
                        </a>
                    </div>
                    
                    <!-- Login link -->
                    <div class="form__signup">
                        Already have an account? 
                        <a id="show-login">Login</a>
                    </div>
                </form>

            </div>
        </div>
    </div>

    <!-- ===== MAIN JS ===== -->
    <script>
        /*===== FOCUS EFFECT FOR INPUTS =====*/
        const inputs = document.querySelectorAll(".form__input");

        function addfocus() {
            let parent = this.parentNode.parentNode;
            parent.classList.add("focus");
        }

        function remfocus() {
            let parent = this.parentNode.parentNode;
            if (this.value == "") {
                parent.classList.remove("focus");
            }
        }

        inputs.forEach(input => {
            input.addEventListener("focus", addfocus);
            input.addEventListener("blur", remfocus);
        });

        /*===== FORM TOGGLE =====*/
        const loginForm = document.getElementById('login-form');
        const signupForm = document.getElementById('signup-form');
        const showSignup = document.getElementById('show-signup');
        const showLogin = document.getElementById('show-login');

        showSignup.addEventListener('click', (e) => {
            e.preventDefault();
            loginForm.classList.remove('active');
            loginForm.classList.add('hidden');
            signupForm.classList.remove('hidden');
            signupForm.classList.add('active');
        });

        showLogin.addEventListener('click', (e) => {
            e.preventDefault();
            signupForm.classList.remove('active');
            signupForm.classList.add('hidden');
            loginForm.classList.remove('hidden');
            loginForm.classList.add('active');
        });

        /*===== FORM SUBMISSION (Demo) =====*/
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            console.log('Login attempt:', { username, password: '***' });
            alert('Login submitted! (Demo only)');
        });

        document.getElementById('signup-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('signup-name').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const confirm = document.getElementById('signup-confirm').value;
            
            if (password !== confirm) {
                alert('Passwords do not match!');
                return;
            }
            
            console.log('Signup attempt:', { name, email, password: '***' });
            alert('Account created! (Demo only)');
        });
    </script>
</body>
</html>
